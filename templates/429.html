<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Lockdown | Wealth Engine</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--color-bg);
      max-width: 100% !important;
    }

    .login-container {
      background-color: var(--color-card);
      padding: 40px;
      border: 1px solid var(--color-border);
      border-top: 4px solid var(--color-red);
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(255, 0, 60, 0.15);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      border-bottom: none;
      padding-bottom: 0;
      margin: 0;
      font-size: 1.8em;
      color: var(--color-red);
      white-space: nowrap;
    }

    .login-header h1::after {
      content: ' _';
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .error-message {
      color: var(--color-red);
      background-color: rgba(255, 0, 60, 0.1);
      border: 1px solid var(--color-red);
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
      animation: flash 0.5s ease-in-out;
      line-height: 1.5;
    }

    @keyframes flash {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .login-header p {
      color: var(--color-text-muted);
      font-size: 0.9em;
      letter-spacing: 1px;
    }

    #bootSequence {
      color: #555;
      font-size: 0.8em;
      text-align: left;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    #bootSequence .warn {
      color: var(--color-yellow);
    }

    #bootSequence .trigger {
      color: var(--color-red);
      margin-top: 5px;
    }

    .error-message .warn {
      font-size: 0.9em;
      color: var(--color-yellow);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>SYSTEM LOCKDOWN</h1>
      <p>Wealth Engine v1.0</p>
    </div>

    <div id="bootSequence">
      <div>> analyzing request volume...&nbsp;[FAIL]</div>
      <div>> checking ip reputation...&nbsp;<span class="warn">[SUSPICIOUS]</span></div>
      <div>> terminating handshake...&nbsp;[OK]</div>
      <div class="trigger">> TRIGGERING DEFENSE PROTOCOL_</div>
    </div>

    <div class="error-message">
      [!] BRUTE FORCE PROTOCOL<br><br>
      <span class="warn">
        Maximum authentication failures reached.<br>
        Mandatory 60-second cooldown active.
      </span>
    </div>
  </div>

</body>
</html>
